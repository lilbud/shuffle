{{ define "main" }}
<div class="content-area col-12 col-lg-10" id="main-column">
  {{ $pages := where site.RegularPages "Params.author" .Title }}
  <div class="card p-3 p-lg-4.5 mb-3 mb-lg-4.5" id="header-card">
    <div class="row d-flex align-items-center justify-content-between">
      <div class="col">
        <div class="page-title">
          Author:
          <span class="text-purple text-capitalize">
            {{ .Title  | replaceRE "-" " " | title }} ({{ len $pages }})
          </span>
        </div>
      </div>
    </div>
  </div>

  {{ range (.Paginate $pages).Pages }}
    {{ partial "post-card.html" . }}
  {{ end }}

  {{ partial "pagination.html" . }}
</div>
{{ end }}
