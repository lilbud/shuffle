<!doctype html>
<html
  lang="{{ site.Language.Locale }}"
  dir="{{ or site.Language.Direction `ltr` }}">

<head>
  {{ partial "head.html" . }}
</head>

<body>
  <header>
    {{ partial "header.html" . }}
  </header>
  <main>
    <div class="padded-body">
      <div class="wrapper">
        <div class="container">
          <div
            class="row d-flex justify-content-center gap-0 g-4.5"
            id="content">
            <div class="content-area col-12 col-lg-8" id="main-column">
              <div class="card p-3 p-lg-4.5 mb-4.5">
                <div class="entry-title mb-3">{{ .Title }}</div>
                {{ .Content }}
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
  {{ partial "footer.html" . }}
</body>
</html>
